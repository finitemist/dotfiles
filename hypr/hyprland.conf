# ─────────────────────────────────────────────────────────────────────────────
#  Hyprland configuration
#  https://wiki.hypr.land/Configuring/
# ─────────────────────────────────────────────────────────────────────────────

# ── Pywal color scheme ────────────────────────────────────────────────────────
source = ~/.cache/wal/colors-hyprland.conf


#####################
### ENVIRONMENT   ###
#####################

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Cursor
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Java / XWayland
env = _JAVA_AWT_WM_NONREPARENTING,1

xwayland {
    force_zero_scaling = true
}


################
### MONITORS ###
################

monitor = eDP-1,1920x1080@144,0x0,1.0       # laptop (main)
monitor = HDMI-A-1,1360x768@60,0x-768,1.0   # external monitor above laptop


####################
### WORKSPACES   ###
####################

# Workspaces 1–5 on laptop, 6–10 on external monitor
workspace = 1,  monitor:eDP-1
workspace = 2,  monitor:eDP-1
workspace = 3,  monitor:eDP-1
workspace = 4,  monitor:eDP-1
workspace = 5,  monitor:eDP-1
workspace = 6,  monitor:HDMI-A-1
workspace = 7,  monitor:HDMI-A-1
workspace = 8,  monitor:HDMI-A-1
workspace = 9,  monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1


####################
### PROGRAMS     ###
####################

$mainMod     = SUPER
$terminal    = kitty
$fileManager = $terminal -e ranger
$menu        = ~/dotfiles/rofi/generate-rofi.sh && rofi -show drun -theme ~/.config/rofi/theme.rasi


#################
### AUTOSTART ###
#################

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = sleep 2 && waybar
exec-once = swww-daemon
exec-once = swaync
# exec-once = nm-applet
# exec-once = blueman-applet
exec-once = hyprpm reload


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 5
    gaps_out = 20

    border_size = 2

    col.active_border   = $color1 $color2 45deg
    col.inactive_border = $background

    resize_on_border = false
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding       = 10
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.85

    shadow {
        enabled        = true
        range          = 15
        render_power   = 3
        color          = rgba(1a1a1aee)
        color_inactive = rgba(00000000)
    }

    blur {
        enabled           = true
        size              = 3
        passes            = 1
        new_optimizations = true
        ignore_opacity    = true
        vibrancy          = 0.1696
    }
}

animations {
    enabled = yes, please :)

    #        NAME,            X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,           ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,         1,     10,    default
    animation = border,         1,     5.39,  easeOutQuint
    animation = windows,        1,     4.79,  easeOutQuint
    animation = windowsIn,      1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,     1,     1.49,  linear,       popin 87%
    animation = fadeIn,         1,     1.73,  almostLinear
    animation = fadeOut,        1,     1.46,  almostLinear
    animation = fade,           1,     3.03,  quick
    animation = layers,         1,     3.81,  easeOutQuint
    animation = layersIn,       1,     4,     easeOutQuint, fade
    animation = layersOut,      1,     3,     easeOutQuint, fade
    animation = fadeLayersIn,   1,     1.79,  almostLinear
    animation = fadeLayersOut,  1,     2.5,   almostLinear
    animation = workspaces,     1,     1.94,  almostLinear, fade
    animation = workspacesIn,   1,     1.21,  almostLinear, fade
    animation = workspacesOut,  1,     1.94,  almostLinear, fade
    animation = zoomFactor,     1,     7,     quick
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper    = 0
    disable_hyprland_logo      = true
    disable_splash_rendering   = true
    vfr                        = true
    vrr                        = 0
    mouse_move_enables_dpms    = true
    enable_swallow             = true
    swallow_regex              = ^(kitty)$
    focus_on_activate          = false
    initial_workspace_tracking = 0
}


#############
### INPUT ###
#############

input {
    kb_layout  = us,ara
    kb_options = grp:alt_shift_toggle

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace


####################
### WINDOW RULES ###
####################

# Suppress maximize requests from apps
windowrule = suppressevent maximize, class:.*

# Fix XWayland drag issues
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Kitty transparency
windowrulev2 = opacity 0.85 0.75, class:^(kitty)$

# Blur + slide animation for bars and notifications
layerrule = blur,                    waybar
layerrule = ignorezero,              waybar
layerrule = blur,                    swaync-notification-window
layerrule = ignorezero,              swaync-notification-window
layerrule = animation slide right,   swaync-notification-window


###################
### KEYBINDINGS ###
###################

# ── Apps ──────────────────────────────────────────────────────
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu

# ── Windows ───────────────────────────────────────────────────
bind = $mainMod, C, killactive,
bind = $mainMod, F, fullscreen,      0
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# ── Focus ─────────────────────────────────────────────────────
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ── Move windows ──────────────────────────────────────────────
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# ── Resize windows ────────────────────────────────────────────
binde = $mainMod CTRL, left,  resizeactive, -20 0
binde = $mainMod CTRL, right, resizeactive,  20 0
binde = $mainMod CTRL, up,    resizeactive,  0 -20
binde = $mainMod CTRL, down,  resizeactive,  0  20

# ── Workspaces ────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, Tab, hyprexpo:expo, all

bind = $mainMod CTRL SHIFT, up,   movecurrentworkspacetomonitor, u
bind = $mainMod CTRL SHIFT, down, movecurrentworkspacetomonitor, d

# ── Scratchpad ────────────────────────────────────────────────
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

# ── Mouse ─────────────────────────────────────────────────────
bind  = $mainMod, mouse_down, workspace,    e+1
bind  = $mainMod, mouse_up,   workspace,    e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow

# ── Alt+Tab ───────────────────────────────────────────────────
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

# ── Volume ────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ── Brightness ────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# ── Media ─────────────────────────────────────────────────────
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause

# ── Screenshots ───────────────────────────────────────────────
bind = ,     Print, exec, grim -g "$(slurp -d)" - | tee ~/Pictures/Screenshots/$(date +'%Y-%m-%d-%H%M%S.png') | wl-copy
bind = SHIFT, Print, exec, grim -o $(hyprctl monitors -j | jq -r '.[] | select(.focused) | .name') - | tee ~/Pictures/Screenshots/$(date +'%Y-%m-%d-%H%M%S.png') | wl-copy

# ── Wallpaper / Theme ─────────────────────────────────────────
bind = $mainMod, W, exec, ~/dotfiles/rofi/wallpaper-picker.sh
bind = $mainMod SHIFT, W, exec, ~/dotfiles/rofi/wallpaper-picker.sh --random
bind = $mainMod ALT, bracketright, exec, ~/dotfiles/rofi/wallpaper-picker.sh --next
bind = $mainMod ALT, bracketleft, exec, ~/dotfiles/rofi/wallpaper-picker.sh --prev

# ── Power ─────────────────────────────────────────────────────
bind = $mainMod ALT, L, exec, swaylock
bind = $mainMod ALT, S, exec, systemctl suspend
bind = $mainMod ALT, R, exec, systemctl reboot
bind = $mainMod ALT, P, exec, systemctl poweroff
bind = $mainMod ALT, M, exit,


#############
### PLUGINS ###
#############

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center current/first 1/last 1/center 1]

        enable_gesture = true # laptop touchpad
        gesture_fingers = 3
        gesture_distance = 300
        gesture_positive = true
    }
}
